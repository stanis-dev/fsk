    DateFormatISO8601:
      description: |
        ((<oas_components_schemas_date_format_iso8601_description))
      type: string
      pattern: '^[0-9]{4}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])$'
      minLength: 10
      maxLength: 10
      example: '2006-01-02'
    DatetimeFormatRFC3339:
      description: |
        ((<oas_components_schemas_date_format_rfc3339_description))
      type: string
      format: date-time
      minLength: 25
      maxLength: 25
      example: '2006-01-02T15:04:05+00:00'
    MaskedCardNumberFormatISO7812:
      description: |
        ((<oas_components_schemas_masked_card_number_format_iso7812_description))
      type: string
      pattern: '^([*0-9]{4,19})$'
      minLength: 4
      maxLength: 19
      example: '***************1234'
    CurrencyFormatISO4217:
      description: |
        ((<oas_components_schemas_currency_format_iso4217_description))
      type: string
      enum:
        - EUR
