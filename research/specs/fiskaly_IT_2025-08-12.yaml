  ## Versioning

  <!-- {{VERSION_DEBUG}} -->

  Our fiskaly API follows [Calendar (Date-based) Versioning](https://calver.org/).
  The version number has a pattern of `YYYY-MM-DD` whereas the `YYYY` stands for the year, `MM` stands for the month, and `DD` stands for the day.

  The latest version is: `X-Api-Version: 2025-08-12`.

  | Version | Supported Country |
  | --- | --- |
  | `X-Api-Version: 2025-08-12` | SIGN IT 🇮🇹, SIGN FR 🇫🇷 |
  | `X-Api-Version: 2024-10-31` | SIGN IT 🇮🇹 |

  ## Idempotency

  Idempotency ensures that repeated identical requests produce the same result, even if they are retried due to network issues, timeouts, or other transient problems.
  This [idempotency](https://en.wikipedia.org/wiki/Idempotence) behavior prevents duplicate resource creation or unintended side effects in APIs that accept `POST` (creation) or `PATCH` (alteration) requests.

  The `X-Idempotency-Key` HTTP header in this API follows the principles of the Internet Engineering Task Force (IETF) [idempotency specification](https://www.ietf.org/archive/id/draft-ietf-httpapi-idempotency-key-header-05.txt) and plays a vital role in implementing idempotent requests.
  API clients use this header to uniquely identify requests, enabling the API to track and manage their outcomes across retries.

  The value of the HTTP header is a [Universally Unique Identifier (UUID)](https://en.wikipedia.org/wiki/Universally_unique_identifier) -- version 3 or version 4 -- key provided by the client for each idempotent request.
  This key ensures that retries of the same request are recognized by the server.

  This key is **required for** all `POST` and `PATCH` requests.
  This key is **ignored for** all other HTTP request methods like `GET`, `PUT`, `DELETE` etc. since these are inherently idempotent by HTTP standards.

  Exception: The `POST /tokens` endpoint currently does not react on the provided `X-Idempotency-Key` HTTP header.
  This exception will be resolved by upcoming improvements to the API.

  The HTTP header format is defined as: `X-Idempotency-Key: <key>`.
  The `<key>` value shall be a valid and randomized `UUIDv4` string.
  Furthermore, this key shall be unique for each logically distinct request.

  The API service keeps track of the `X-Idempotency-Key` (key) and the associated request status, payload, and response (value) in a persistence cache.
  By default the stored idempotency key-value pairs expire after 24 hours (1 day) after their creation timestamp.
  If another request reaches the API service and there is already the same `X-Idempotency-Key` available, where the request method and payload are also equal to the cached value, the API service returns the cached response.

  If the API service returns:
  - `422 Unprocessable Entity`: Verify that the request headers and payload match exactly between retries. Ensure the idempotency key is not reused for unrelated operations.
  - `409 Conflict`: The request is already being processed. Wait before retrying and ensure there are no concurrent retries with the same idempotency key.

  # Quick Start

  For a quick first demo, you may use Postman.  
  We prepared a Postman collection that allows you to step through the most important functions of this API.

  1. Download the [Postman](https://www.getpostman.com/downloads/) application.

  2. Create an **API Key** and **API Secret** via the [fiskaly dashboard](https://dashboard.fiskaly.com).

  3. Download your **fiskaly SIGN IT** Postman environment JSON-based configuration file: <a href="/static/postman/fiskaly_sign_it_2025-08-12_postman_environment.json" download>Download Postman Environment</a>

  4. Download the **fiskaly SIGN IT** Postman collection JSON-based configuration file: <a href="/static/postman/fiskaly_sign_it_2025-08-12_postman_collection.json" download>Download Postman Collection</a>

  5. Start Postman and import the downloaded Postman environment and collection files.

  6. Update the **API Key** and **API Secret** values in the Postman environment to match your credentials.

  7. Select the **fiskaly SIGN IT** Postman environment and run the collection.


