oas_components_schemas_pagination_description: |
  Represents the pagination information of a list endpoint `results` set. If not provided, the current elements in the `results` set are the last elements.

oas_components_schemas_pagination_next_description: |
  Represents the pagination request to the next results set, which is composed of the requested resources, pagination token, and the pagination limit.

oas_components_schemas_pagination_token_description: |
  Represents the pagination token, which is used as an index pointer to the next page relative to the current page in Base64 encoding.

oas_components_schemas_pagination_limit_description: |
  Represents the pagination limit of the results set of a listing endpoint.

