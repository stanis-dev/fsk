oas_components_schemas_record_state_description: |
  Enum: "ACCEPTED" "REJECTED" "COMPLETED" "FAILED"
  The state property reflects the current status of the Record resource.
  ACCEPTED: The Record request has been received, the Record resource has been created, and processing has started.
  REJECTED: The Record request has been received, the Record resource has been created, but validation errors during creation caused the request to be rejected. Details are available in the logs of the Record response.
  COMPLETED: The Record request has been successfully processed.
  FAILED: The Record request failed and one or more errors occurred during processing. Details are available in the logs of the Record response.

oas_components_schemas_record_mode_description: |
  Enum: "PROCESSING" "FINISHED"
  The mode property reflects the current activity of the Record resource.
  PROCESSING: The Record resource still has ongoing processing activity.
  FINISHED: The Record resource finished all processing activity. The state determines the resulting outcome of the requested operation.

