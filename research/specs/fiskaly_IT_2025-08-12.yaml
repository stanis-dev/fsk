  Italian Tax code (“Codice fiscale”) of the natural person authorised to access the Agenzia delle Entrate (AdE) portal using Fisconline credentials and to operate on behalf of the business. It consists of 16 alphanumeric characters. 

  **Recommended**: Provide this field explicitly. If omitted, it will be automatically populated from `fiscalization.tax_id_number`. However, this fallback value may not always match the specific requirements of this field and can cause issues during Entity commissioning and/or Record submission. 

