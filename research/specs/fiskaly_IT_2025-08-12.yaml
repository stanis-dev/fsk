# Entities
#

oas_tags_entities_name: "Entities"
oas_tags_entities_description: |
  An `Entity` resource represents a particular `Asset::UNIT` with the relevant legal entity (taxpayer) data.
  A legal entity consists of two main parts: taxpayer information and country-specific fiscalization details.

  The lifecycle of an `Entity` resource is depicted in the following `state` and `mode` transitions:

  ![](/static/docs/entity_system_state_mode_en_it.png)

oas_paths_entities_list_summary: "List entities"
oas_paths_entities_list_description:  |
  This endpoint is used to list `Entity` resources.

oas_paths_entities_create_summary: "Create an entity"
oas_paths_entities_create_description: |
  This endpoint is used create `Entity` resources.
  Currently the fiskaly API supports the following creation use cases:
  - legal entities (taxpayer) as a `COMPANY` (for business entities) or as an `INDIVIDUAL` (for self-employed) which require the details of the entity legal name, legal address, and fiscalization-related data such as the VAT number, tax identification number, and credentials for accessing the Revenue Agency portal.
  - `LOCATION` entities represent the physical address of the business premises or establishment of a given legal entity -- `COMPANY` or `INDIVIDUAL`

  When an `Entity` is created, its initial `state` is automatically set to `ACQUIRED`.
  In order to make it fully operational, the `state` must be updated to `COMMISSIONED` using the [updateEntity](#tag/Entities/operation/updateEntity) endpoint.

oas_paths_entities_update_summary: "Update an entity"
oas_paths_entities_update_description: |
  This endpoint is used to update an `Entity` resource.

  Please note that, for certain use cases, particular state and mode transitions are required.
  Please refer to our [Guide](https://developer.fiskaly.com/sign-it/entity_system_states_and_modes) for examples.

oas_paths_entities_retrieve_summary: "Retrieve an entity"
oas_paths_entities_retrieve_description: |
  This endpoint is used to retrieve an `Entity` resource.

