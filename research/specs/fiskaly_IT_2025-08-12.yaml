oas_tags_assets_name: |
  Assets

oas_tags_assets_description: |
  `Asset` resources are used to represent a management structure (organizational hierarchy):

  - `TENANT` represents the PoS provider or a retailer that operates its own PoS system. It is the top-level organization in the structure. This type represents the first created organization via the fiskaly Dashboard and cannot be created via the API.
  - `GROUP` an optional intermediate layer used to group multiple `Asset` resources of type UNIT.
  - `UNIT` represents a merchant.

