  # Introduction
  The fiskaly API is a RESTful, cross-country solution designed to support compliance with the relevant legislation. 
  
  The fiskaly API is a platform-independent and software-only solution.
  Since this is a cloud-based API, the only requirement to integrate and use this fiskaly API is a stable Internet connection. The API ...

  - has resource-oriented URLs,

  - accepts [JSON](https://wikipedia.org/wiki/JSON)-encoded request bodies,

  - returns [JSON](https://wikipedia.org/wiki/JSON)-encoded responses,

  - uses standard HTTP status codes and verbs, and

  - is designed to be easily integrated into any system.

  ## Italy specifications

  This API documentation specifically covers the Italian module, SIGN IT, that ensures compliance with Italian legislation for the telematic transmission of daily transactions. Compliance can be achieved through two different options: **SIGN IT** in its *lite* version or in its *full* version:

  - **SIGN IT** in its *lite* version connects your PoS with the Revenue Agencys web portal for the issuance of Online Commercial Documents, a [legally valid alternative](https://www.agenziaentrate.gov.it/portale/gli-strumenti-a-disposizione) to the telematic registers to issue compliant receipts.
  - **SIGN IT** in its *full* version will comply with the new generation of software fiscalization as described in article 24 of D lgs 1 - 2024.

  **SIGN IT** provides a test environment for integration and testing purposes as well as a dedicated live environment for performing the real-time sending of official transactions (commercial documents) to the Italian "Online commercial document" web procedure, present in the "Invoices and Fees" portal of the Revenue Agency. In order to access the live environment, please contact our [sales team](mailto:sales@fiskaly.com).  

  # Background

  **SIGN IT** implements legal requirements and technical guidelines for fiscalization compliance of PoS softwares in Italy.

  **SIGN IT** in its *lite* version is based on the following Italian regulation:
  - Legislative Decree no. 127/2015 for the "Telematic transmission of VAT operations and control of sales of goods carried out through automatic dispensers" for the technological tools that guarantee the inalterability and security of the data, mandatory since 2021 for all taxpayers issuing commercial documents.

  **SIGN IT** in its *full* version is based on the following Italian regulation:
  - [Article 24 of the Legislative Decree published on January 8, 2024](https://www.gazzettaufficiale.it/eli/id/2024/01/12/24G00007/SG). The electronic storage of the total amount and telematic transmission of daily fees may be performed by means of software solutions that guarantee the security and inalterability of the data. These solutions must be able to enable the full integration and interaction with electronic payment processes, in order to simplify and reduce the administrative operations for taxpayers.

  # Service

  Our fiskaly API service offers a compliance-as-a-service solution implementation that records business transaction, technical events, and taxpayer interactions in an inalterable and cryptographically secure way.

  ## Italy specifications

  The fiskaly SIGN IT [service](https://www.fiskaly.com/signit) provides a 100% legally compliant implementation in order to transmit the information from each transaction to the Revenue Agency in real time.

  ## Guides

  To ensure a smooth implementation of our fiskaly API, we highly recommend that you first have a look at our [integration guides](https://developer.fiskaly.com/) where you will find an explanation of how to create your organizational structure and API keys, as well as a first overview of our fiskaly API endpoints.

