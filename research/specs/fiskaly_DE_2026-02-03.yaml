oas_info_contact_name: 'info'
oas_info_description: |
  Imprint: [fiskaly.com/impressum](https://fiskaly.com/impressum)
  <br>
  Privacy Policy: [fiskaly.com/privacy-policy](https://www.fiskaly.com/privacy-policy)
  <br>
  Service Details: [fiskaly.com/electronic-invoicing](https://www.fiskaly.com/electronic-invoicing-b2b)
  <br>
  Developer Guide: [developer.fiskaly.com/e-invoice](https://developer.fiskaly.com/e-invoice/integration_guide)

  # Introduction
  The fiskaly API is a RESTful, cross-country solution designed to support compliance with the relevant legislation. 

  The fiskaly API is a platform-independent and software-only solution.
  Since this is a cloud-based API, the only requirement to integrate and use this fiskaly API is a stable Internet connection. The API ...

  - has resource-oriented URLs,

  - accepts [JSON](https://wikipedia.org/wiki/JSON)-encoded request bodies,

  - returns [JSON](https://wikipedia.org/wiki/JSON)-encoded responses,

  - uses standard HTTP status codes and verbs, and

  - is designed to be easily integrated into any system.

  # Background

  fiskaly E-INVOICE supports electronic invoicing based on the European standard EN 16931, published by CEN/TC 434 on June 28, 2017, which defines a common semantic data model for e-invoices and is aligned with EU Directive 2014/55/EU.

  EN 16931 defines the required invoice content as structured, machine-readable data. Compliance depends on producing invoices that match this structure and exchanging them electronically between sender and recipient systems through the applicable transmission model.

  # Service

  Our fiskaly API service offers a compliance-as-a-service solution implementation that records business transaction, technical events, and taxpayer interactions in an inalterable and cryptographically secure way.

  ## Guides

  To ensure a smooth implementation of our fiskaly API, we highly recommend that you first have a look at our [integration guide](https://developer.fiskaly.com/e-invoice/integration_guide) where you will find an explanation of how to create your organizational structure and API keys, as well as a first overview of our fiskaly API endpoints.

