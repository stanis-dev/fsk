oas_tags_organizations_name: |
  Organizations

oas_tags_organizations_description: |
  `Organization` resources are used to represent a management structure (organizational hierarchy):

  - `ACCOUNT` represents the PoS provider or a retailer that operates its own PoS system. It is the top-level organization in the structure. This type represents the first created organization via the fiskaly Dashboard and cannot be created via the API.
  - `GROUP` an optional intermediate layer used to group multiple `Organization` resources of type UNIT.
  - `UNIT` represents a merchant.

