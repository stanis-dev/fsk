oas_components_schemas_universally_unique_identifier_v3_description: |
  A Universally Unique Identifier Version 3 (UUIDv3) is a string-based label used to uniquely identify objects in a computer system based on MD5 hashed textual information of a namespace and name.
  The representation of UUIDs is defined in the [RFC 4122](https://www.rfc-editor.org/rfc/rfc4122).

oas_components_schemas_universally_unique_identifier_v4_description: |
  A Universally Unique Identifier Version 4 (UUIDv4) is a string-based label used to uniquely identify objects in a computer system.
  The representation of UUIDs is defined in the [RFC 4122](https://www.rfc-editor.org/rfc/rfc4122).

oas_components_schemas_universally_unique_identifier_v7_description: |
  A Universally Unique Identifier Version 7 (UUIDv7) is a string-based label used to uniquely identify objects in a computer system based on a millisecond Unix timestamp and a (pseudo) randomized number to avoid collisions. 
  The representation of UUIDs is defined in the [RFC 4122](https://www.rfc-editor.org/rfc/rfc4122).

