#
#
# Token
#

oas_tags_tokens_name: 'Tokens'
oas_tags_tokens_description: |
  In order to access the fiskaly API, a valid **JSON Web Token (JWT)** is required.
  The information carried inside the **JWT** is used for authentication and authorization of every request towards the fiskaly API.
  API requests without a **JWT** present will fail with an unauthorized access HTTP error `401`.xf

  A `Token` resource can be created by using the `key` and `secret` credentials information of an already existing `Subject::API_KEY`.
  The API key `secret` will be generated from the fiskaly API and provided only in the response of the `POST /tokens` request.

  Each `Token` resource has its own unique `id` in form of a [UUIDv4](https://datatracker.ietf.org/doc/html/rfc4122), the **JWT** `bearer` string, an `issued_at` timestamp, and an `expires_at` timestamp.
  Additionally, the `token` resource provides the information to which `Asset` and which `Subject` the token belongs to.

  The **JWT** `bearer` string must be sent with every following request in the HTTP `Authorization` header field using the `Bearer` [authentication scheme](https://datatracker.ietf.org/doc/html/rfc6750#section-2.1).

  The fiskaly API processes only `https` based requests.
  Plain `http` based requests are redirected to `https` by the fiskaly service.

oas_paths_tokens_create_summary: 'Create a token'
oas_paths_tokens_create_description: |
  This endpoint is used to create a `Token` resource.
  Currently, the fiskaly API supports an `Subject::API_KEY` based `Token` creation which returns the [JWT](#tag/Tokens) `bearer` HTTP authentication string that is valid until a given `expires_at` timestamp.

  Recreations of the new `Token` resource is requried only then if the received [JWT](#tag/Tokens) `bearer` string has expired.

