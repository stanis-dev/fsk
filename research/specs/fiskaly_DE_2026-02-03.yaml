oas_components_schemas_metadata_description: |
  Attach custom key value data to a resource. Useful for storing additional, structured information.
  If `metadata` appears in a response, it reflects the current metadata of the object.
  You can update metadata via the resource’s update endpoint. If a key is sent with an empty string value in an update, that key–value pair is removed.

  **Note**: Up to 20 keys. Key names up to 40 characters. Values up to 500 characters.

